<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="60" y1="40" x2="1180" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.45" stop-color="#0B2742"/>
      <stop offset="1" stop-color="#123E64"/>
    </linearGradient>
    <linearGradient id="accent" x1="246" y1="164" x2="1014" y2="477" gradientUnits="userSpaceOnUse">
      <stop stop-color="#18B7C9"/>
      <stop offset="1" stop-color="#F4B942"/>
    </linearGradient>
    <filter id="blur" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="28" fill="url(#bg)"/>

  <g filter="url(#blur)" opacity="0.35">
    <circle cx="203" cy="134" r="120" fill="#18B7C9"/>
    <circle cx="1030" cy="488" r="140" fill="#F4B942"/>
    <circle cx="816" cy="112" r="90" fill="#4FD1A1"/>
  </g>

  <rect x="62" y="58" width="1156" height="524" rx="28" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.12"/>

  <text x="96" y="140" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700">
    SnyDrone
  </text>
  <text x="96" y="192" fill="#B7C8D9" font-family="Arial, Helvetica, sans-serif" font-size="26">
    Natural-language cinematic drone control with ROS 2, PX4, Isaac Sim, Pegasus, and vision.
  </text>

  <g>
    <rect x="96" y="250" width="228" height="118" rx="22" fill="#0D1E31" stroke="#2E5B7F"/>
    <text x="122" y="294" fill="#F4B942" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Intent Layer</text>
    <text x="122" y="326" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Prompt to Shot Spec</text>
    <text x="122" y="351" fill="#AFC2D4" font-family="Arial, Helvetica, sans-serif" font-size="16">Rule-based or LLM planning</text>
  </g>

  <g>
    <rect x="362" y="250" width="228" height="118" rx="22" fill="#0D1E31" stroke="#2E5B7F"/>
    <text x="388" y="294" fill="#18B7C9" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Motion Layer</text>
    <text x="388" y="326" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Shot to Trajectory</text>
    <text x="388" y="351" fill="#AFC2D4" font-family="Arial, Helvetica, sans-serif" font-size="16">Orbit, hold, timing, yaw</text>
  </g>

  <g>
    <rect x="628" y="250" width="228" height="118" rx="22" fill="#0D1E31" stroke="#2E5B7F"/>
    <text x="654" y="294" fill="#4FD1A1" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Control Layer</text>
    <text x="654" y="326" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">ROS 2 to PX4</text>
    <text x="654" y="351" fill="#AFC2D4" font-family="Arial, Helvetica, sans-serif" font-size="16">ENU to NED offboard bridge</text>
  </g>

  <g>
    <rect x="894" y="250" width="288" height="118" rx="22" fill="#0D1E31" stroke="#2E5B7F"/>
    <text x="920" y="294" fill="#F4B942" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Simulation + Vision</text>
    <text x="920" y="326" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Isaac Sim + Pegasus + YOLO</text>
    <text x="920" y="351" fill="#AFC2D4" font-family="Arial, Helvetica, sans-serif" font-size="16">Moving target, camera, detection</text>
  </g>

  <path d="M324 309H362" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M590 309H628" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M856 309H894" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>

  <g opacity="0.95">
    <circle cx="980" cy="468" r="54" fill="#0D1E31" stroke="#4BC0C8" stroke-width="3"/>
    <circle cx="980" cy="468" r="8" fill="#4BC0C8"/>
    <circle cx="928" cy="430" r="12" fill="#F4B942"/>
    <circle cx="1032" cy="430" r="12" fill="#F4B942"/>
    <circle cx="928" cy="506" r="12" fill="#F4B942"/>
    <circle cx="1032" cy="506" r="12" fill="#F4B942"/>
    <path d="M940 438L960 456" stroke="#F4B942" stroke-width="4"/>
    <path d="M1020 438L1000 456" stroke="#F4B942" stroke-width="4"/>
    <path d="M940 498L960 480" stroke="#F4B942" stroke-width="4"/>
    <path d="M1020 498L1000 480" stroke="#F4B942" stroke-width="4"/>
  </g>

  <text x="96" y="462" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">
    Current focus
  </text>
  <text x="96" y="506" fill="#B7C8D9" font-family="Arial, Helvetica, sans-serif" font-size="24">
    Building a clean end-to-end stack for autonomous aerial cinematography in simulation first,
  </text>
  <text x="96" y="540" fill="#B7C8D9" font-family="Arial, Helvetica, sans-serif" font-size="24">
    then tightening perception, safety, and hardware readiness.
  </text>
</svg>
